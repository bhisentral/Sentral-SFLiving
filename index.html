.card{position:relative;z-index:2;width:min(92vw,440px);padding:3rem 2.75rem;background:rgba(10,22,40,.55);backdrop-filter:blur(10px);border:1px solid rgba(236,197,110,.35);border-radius:6px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.eyebrow{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-light);border:1px solid rgba(236,197,110,.6);padding:6px 14px;border-radius:2px;margin-bottom:1.75rem}

form{display:flex;flex-direction:column;gap:.9rem}
input{width:100%;padding:.85rem 1rem;font-size:15px;font-family:inherit;color:var(--white);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);border-radius:4px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--gold-light)}
input::placeholder{color:rgba(255,255,255,.45)}
button{width:100%;padding:.85rem 1rem;font-size:14px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;font-family:inherit;color:var(--navy);background:var(--gold-light);border:none;border-radius:4px;cursor:pointer;transition:background .2s,opacity .2s}
button:hover{background:var(--gold)}
button:disabled{opacity:.6;cursor:default}
.err{min-height:1.1em;font-size:13px;color:#ff9b8f;margin-top:.25rem}
.foot{margin-top:1.75rem;font-size:11px;letter-spacing:.04em;color:rgba(255,255,255,.4)}
</style>

const f=document.getElementById('f'),pw=document.getElementById('pw'),err=document.getElementById('err'),btn=document.getElementById('btn');
async function decrypt(password){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:SALT,iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:IV},key,PAYLOAD);
